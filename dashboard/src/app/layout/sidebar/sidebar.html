<div class="sidebar-wrapper">
  <!-- Brand Header -->
  <div class="brand-header">
    <div class="logo-area">
      <i class="pi pi-bolt logo-icon"></i>
      <span class="logo-text">SysPulse</span>
    </div>
    <button class="menu-toggle-btn">
      <i class="pi pi-bars"></i>
    </button>
  </div>

  <!-- Navigation Menu Links -->
  <nav class="nav-menu">
    <a routerLink="/devices" routerLinkActive="active" class="menu-item">
      <i class="pi pi-desktop menu-icon"></i>
      <span class="menu-label">Connected Devices</span>
    </a>
    <a [routerLink]="getRealtimeLink()" routerLinkActive="active" class="menu-item">
      <i class="pi pi-chart-line menu-icon"></i>
      <span class="menu-label">Real-Time Stats</span>
    </a>
    <a routerLink="/configuration" routerLinkActive="active" class="menu-item">
      <i class="pi pi-cog menu-icon"></i>
      <span class="menu-label">Configuration</span>
    </a>
    <a routerLink="/alerts" routerLinkActive="active" class="menu-item">
      <i class="pi pi-bell menu-icon"></i>
      <span class="menu-label">Alerts</span>
    </a>
    <a routerLink="/message-config" routerLinkActive="active" class="menu-item">
      <i class="pi pi-envelope menu-icon"></i>
      <span class="menu-label">Message Config</span>
    </a>
    <a routerLink="/reports" routerLinkActive="active" class="menu-item">
      <i class="pi pi-file menu-icon"></i>
      <span class="menu-label">Reports</span>
    </a>
  </nav>

  <!-- Sidebar Footer -->
  <div class="sidebar-footer">
    <span class="version-label">v1.0.0</span>
  </div>
</div>
